name: NeuroLab CI/CD

on:
  push:
    branches: [ "main", "staging" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"
        
    - name: Install dependencies
      working-directory: ./backend
      run: |
        python -m pip install --upgrade pip
        pip install ruff pytest httpx
        pip install -r requirements.txt
        
    - name: Lint with Ruff
      working-directory: ./backend
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        ruff check . --select=E9,F63,F7,F82 --show-source
        # exit-zero treats all errors as warnings
        ruff check . --exit-zero
        
    - name: Test with pytest
      working-directory: ./backend
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
      run: |
        # Only run if tests exist, else skip gracefully
        if [ -d "tests" ]; then pytest tests/; else echo "No tests folder found, skipping."; fi

  frontend-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js 20
      uses: actions/setup-node@v3
      with:
        node-version: "20"
        
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci || npm install
      
    - name: TypeScript Linting
      working-directory: ./frontend
      run: npm run lint --if-present
      
    - name: Build React App
      working-directory: ./frontend
      run: npm run build
      
  docker-security-scan:
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]
    steps:
    - uses: actions/checkout@v3
    
    - name: Build containers for scanning
      run: docker-compose build
      
    - name: Scan Backend Docker Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'ai-stem-lab-assistant-backend:latest'
        format: 'table'
        exit-code: '0' # Set to 1 to fail the build on critical vulnerabilities
        ignore-unfixed: true
        vuln-type: 'os,library'
        severity: 'CRITICAL,HIGH'
